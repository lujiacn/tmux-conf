# -- general -------------------------------------------------------------------

set  -g default-terminal "tmux-256color"
set -sa terminal-overrides ",xterm-256color:RGB"
set -sa terminal-overrides ",alacritty:RGB"
set -sa terminal-overrides ",wezterm:RGB"

setw -g xterm-keys on
set  -s escape-time 10          # faster command sequences
set -sg repeat-time 600         # increase repeat timeout
set  -s focus-events on

set  -g prefix2 C-a             # GNU-Screen compatible prefix
bind C-a send-prefix -2

set  -g history-limit 10000
setw -g mode-keys vi

# reload configuration (points at the actual XDG config path)
bind r source-file ~/.config/tmux/tmux.conf \; display '~/.config/tmux/tmux.conf sourced'

# tpm needs to look in the XDG plugin dir, not ~/.tmux/plugins
setenv -g TMUX_PLUGIN_MANAGER_PATH "~/.config/tmux/plugins/"

# -- display -------------------------------------------------------------------

set  -g base-index 1            # start windows numbering at 1
setw -g pane-base-index 1       # make pane numbering consistent with windows

setw -g automatic-rename on     # rename window to reflect current program
set  -g renumber-windows on     # renumber windows when a window is closed

set  -g set-titles on

# clear screen + scrollback
bind -n C-l send-keys C-l \; run 'sleep 0.1' \; clear-history

# activity
set  -g monitor-activity on
set  -g visual-activity off

# -- navigation ----------------------------------------------------------------

bind C-c new-session
bind c   new-window -c "#{pane_current_path}"
bind C-f command-prompt -p find-session 'switch-client -t %%'

# split panes, retain cwd
bind -   split-window -v -c "#{pane_current_path}"
bind \\  split-window -h -c "#{pane_current_path}"

# pane navigation (vi)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind    > swap-pane -D
bind    < swap-pane -U

# pane resizing
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# window navigation
unbind n
unbind p
bind -r C-h previous-window
bind -r C-l next-window
bind    Tab last-window

set -g mouse on

# -- copy mode -----------------------------------------------------------------

bind Enter copy-mode

bind -T copy-mode-vi v     send -X begin-selection
bind -T copy-mode-vi C-v   send -X rectangle-toggle
bind -T copy-mode-vi y     send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi H     send -X start-of-line
bind -T copy-mode-vi L     send -X end-of-line

# system clipboard (first match wins)
if -b 'command -v pbcopy > /dev/null 2>&1' \
    'bind y run -b "tmux save-buffer - | pbcopy"'
if -b 'command -v reattach-to-user-namespace > /dev/null 2>&1' \
    'bind y run -b "tmux save-buffer - | reattach-to-user-namespace pbcopy"'
if -b 'command -v xsel > /dev/null 2>&1' \
    'bind y run -b "tmux save-buffer - | xsel -i -b"'
if -b '! command -v xsel > /dev/null 2>&1 && command -v xclip > /dev/null 2>&1' \
    'bind y run -b "tmux save-buffer - | xclip -i -selection clipboard >/dev/null 2>&1"'
if -b 'command -v clip.exe > /dev/null 2>&1' \
    'bind y run -b "tmux save-buffer - | clip.exe"'

# OSC 52 — copy works over SSH in supporting terminals
set -g set-clipboard on

# -- buffers -------------------------------------------------------------------

bind b list-buffers
bind p paste-buffer
bind P choose-buffer

# -- plugins (tpm) -------------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'odedlaz/tmux-onedark-theme'

# Keep this at the very bottom.
run '~/.config/tmux/plugins/tpm/tpm'
